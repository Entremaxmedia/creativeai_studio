name: Build & Release Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version from manifest
        id: ver
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('chrome-extension/manifest.json'))['version'], end='')")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Patch manifest with update_url
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          python3 - << PYEOF
import json
with open('chrome-extension/manifest.json') as f:
    m = json.load(f)
m['update_url'] = '$PAGES_URL/updates.xml'
with open('chrome-extension/manifest.json', 'w') as f:
    json.dump(m, f, indent=2)
print("update_url set to:", m['update_url'])
PYEOF

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Build Chrome zip
        run: |
          mkdir -p dist
          cd chrome-extension
          zip -r ../dist/creative-ai-chrome.zip . \
            --exclude "generate-icons.js" --exclude "*.DS_Store" --exclude "README.md"

      - name: Sign Chrome CRX
        id: crx
        env:
          PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$PRIVATE_KEY" > /tmp/key.pem
          sed -i 's/\r//' /tmp/key.pem
          OUTPUT=$(node scripts/sign-crx.cjs dist/creative-ai-chrome.zip /tmp/key.pem dist/creative-ai.crx)
          rm -f /tmp/key.pem
          echo "$OUTPUT"
          EXT_ID=$(echo "$OUTPUT" | grep "Extension ID:" | awk '{print $3}')
          echo "ext_id=$EXT_ID" >> $GITHUB_OUTPUT
          echo "CRX built: $(du -sh dist/creative-ai.crx)"

      - name: Build Edge zip
        run: |
          cp -r chrome-extension /tmp/edge-ext
          python3 - << PYEOF
import json
with open('/tmp/edge-ext/manifest.json') as f:
    m = json.load(f)
m.pop('side_panel', None)
m['permissions'] = [p for p in m.get('permissions', []) if p != 'sidePanel']
m.setdefault('action', {})['default_popup'] = 'popup.html'
with open('/tmp/edge-ext/manifest.json', 'w') as f:
    json.dump(m, f, indent=2)
PYEOF
          cd /tmp/edge-ext
          zip -r $GITHUB_WORKSPACE/dist/creative-ai-edge.zip . \
            --exclude "generate-icons.js" --exclude "*.DS_Store" --exclude "README.md"

      - name: Build Opera zip
        run: |
          cp -r chrome-extension /tmp/opera-ext
          python3 - << PYEOF
import json
with open('/tmp/opera-ext/manifest.json') as f:
    m = json.load(f)
m.pop('side_panel', None)
m['permissions'] = [p for p in m.get('permissions', []) if p != 'sidePanel']
m.setdefault('action', {})['default_popup'] = 'popup.html'
with open('/tmp/opera-ext/manifest.json', 'w') as f:
    json.dump(m, f, indent=2)
PYEOF
          cd /tmp/opera-ext
          zip -r $GITHUB_WORKSPACE/dist/creative-ai-opera.zip . \
            --exclude "generate-icons.js" --exclude "*.DS_Store" --exclude "README.md"

      - name: Build Vivaldi zip (same as Chrome)
        run: cp dist/creative-ai-chrome.zip dist/creative-ai-vivaldi.zip

      - name: Build Safari zip (popup mode)
        run: |
          cp -r chrome-extension /tmp/safari-ext
          python3 - << PYEOF
import json
with open('/tmp/safari-ext/manifest.json') as f:
    m = json.load(f)
m.pop('side_panel', None)
m['permissions'] = [p for p in m.get('permissions', []) if p != 'sidePanel']
m.setdefault('action', {})['default_popup'] = 'popup.html'
with open('/tmp/safari-ext/manifest.json', 'w') as f:
    json.dump(m, f, indent=2)
PYEOF
          cd /tmp/safari-ext
          zip -r $GITHUB_WORKSPACE/dist/creative-ai-safari.zip . \
            --exclude "generate-icons.js" --exclude "*.DS_Store" --exclude "README.md"

      - name: Generate updates.xml and prepare GitHub Pages
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          VERSION="${{ steps.ver.outputs.version }}"
          EXT_ID="${{ steps.crx.outputs.ext_id }}"
          if [ -z "$EXT_ID" ]; then
            EXT_ID="${{ secrets.CHROME_EXTENSION_ID }}"
          fi
          echo "Extension ID: $EXT_ID"
          mkdir -p pages
          cat > pages/updates.xml << XML
<?xml version='1.0' encoding='UTF-8'?>
<gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
  <app appid='${EXT_ID}'>
    <updatecheck codebase='https://${OWNER}.github.io/${REPO}/creative-ai.crx' version='${VERSION}' />
  </app>
</gupdate>
XML
          cp dist/creative-ai.crx pages/creative-ai.crx

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}-build${{ github.run_number }}
          name: "Creative AI Extension v${{ steps.ver.outputs.version }}"
          make_latest: true
          body: |
            ## Install instructions

            **Auto-updating install (Chrome/Edge/Vivaldi):**
            Download `creative-ai.crx`, open `chrome://extensions`, enable Developer mode, then drag and drop the `.crx` file onto the page. Chrome will auto-update this install silently.

            **Manual install (all browsers):**
            Download the `.zip` for your browser, extract it, go to `chrome://extensions` (or equivalent), enable Developer mode, click "Load unpacked", and select the extracted folder.

            **Safari:**
            Download `creative-ai-safari.zip`, extract it, then run `xcrun safari-web-extension-converter ./creative-ai-safari` in Terminal to convert it for Safari via Xcode.
          files: |
            dist/creative-ai-chrome.zip
            dist/creative-ai-edge.zip
            dist/creative-ai-opera.zip
            dist/creative-ai-vivaldi.zip
            dist/creative-ai-safari.zip
            dist/creative-ai.crx
