name: Build & Release Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Read version from manifest
        id: ver
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('chrome-extension/manifest.json')); print(d['version'], end='')")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Patch manifest with update_url
        env:
          PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        run: |
          python3 -c "
          import json, os
          path = 'chrome-extension/manifest.json'
          m = json.load(open(path))
          m['update_url'] = os.environ['PAGES_URL'] + '/updates.xml'
          open(path, 'w').write(json.dumps(m, indent=2))
          print('update_url set to:', m['update_url'])
          "

      - name: Build Chrome zip
        run: |
          mkdir -p dist
          cd chrome-extension
          zip -r ../dist/creative-ai-chrome.zip . \
            --exclude "generate-icons.js" --exclude "*.DS_Store" --exclude "README.md"

      - name: Read signing key
        id: read_key
        run: |
          echo "key<<KEYEOF" >> $GITHUB_OUTPUT
          cat scripts/crx-signing-key.pem >> $GITHUB_OUTPUT
          echo "KEYEOF" >> $GITHUB_OUTPUT

      - name: Sign Chrome CRX
        id: crx
        uses: cardinalby/webext-buildtools-chrome-crx-action@v2
        with:
          zipFilePath: dist/creative-ai-chrome.zip
          crxFilePath: dist/creative-ai.crx
          privateKey: ${{ steps.read_key.outputs.key }}

      - name: Build Edge zip
        run: |
          cp -r chrome-extension /tmp/edge-ext
          python3 -c "
          import json
          path = '/tmp/edge-ext/manifest.json'
          m = json.load(open(path))
          m.pop('side_panel', None)
          m['permissions'] = [p for p in m.get('permissions', []) if p != 'sidePanel']
          m.setdefault('action', {})['default_popup'] = 'popup.html'
          open(path, 'w').write(json.dumps(m, indent=2))
          "
          cd /tmp/edge-ext
          zip -r $GITHUB_WORKSPACE/dist/creative-ai-edge.zip . \
            --exclude "generate-icons.js" --exclude "*.DS_Store" --exclude "README.md"

      - name: Build Opera zip
        run: |
          cp -r chrome-extension /tmp/opera-ext
          python3 -c "
          import json
          path = '/tmp/opera-ext/manifest.json'
          m = json.load(open(path))
          m.pop('side_panel', None)
          m['permissions'] = [p for p in m.get('permissions', []) if p != 'sidePanel']
          m.setdefault('action', {})['default_popup'] = 'popup.html'
          open(path, 'w').write(json.dumps(m, indent=2))
          "
          cd /tmp/opera-ext
          zip -r $GITHUB_WORKSPACE/dist/creative-ai-opera.zip . \
            --exclude "generate-icons.js" --exclude "*.DS_Store" --exclude "README.md"

      - name: Build Vivaldi zip (same as Chrome)
        run: cp dist/creative-ai-chrome.zip dist/creative-ai-vivaldi.zip

      - name: Build Safari zip (popup mode)
        run: |
          cp -r chrome-extension /tmp/safari-ext
          python3 -c "
          import json
          path = '/tmp/safari-ext/manifest.json'
          m = json.load(open(path))
          m.pop('side_panel', None)
          m['permissions'] = [p for p in m.get('permissions', []) if p != 'sidePanel']
          m.setdefault('action', {})['default_popup'] = 'popup.html'
          open(path, 'w').write(json.dumps(m, indent=2))
          "
          cd /tmp/safari-ext
          zip -r $GITHUB_WORKSPACE/dist/creative-ai-safari.zip . \
            --exclude "generate-icons.js" --exclude "*.DS_Store" --exclude "README.md"

      - name: Generate updates.xml and prepare GitHub Pages
        run: |
          EXT_ID="kililjbikhljfpjibnpnmjhdkapkfimm"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="${{ github.event.repository.name }}"
          VERSION="${{ steps.ver.outputs.version }}"
          echo "Extension ID: $EXT_ID"
          echo "Pages URL: https://$OWNER.github.io/$REPO/"
          mkdir -p pages
          cat > pages/updates.xml << EOF
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='$EXT_ID'>
              <updatecheck codebase='https://$OWNER.github.io/$REPO/creative-ai.crx' version='$VERSION' />
            </app>
          </gupdate>
          EOF
          cat pages/updates.xml
          cp dist/creative-ai.crx pages/creative-ai.crx

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages

      - name: Copy policy files to dist
        run: cp policy/windows-install.reg policy/mac-install.sh policy/windows-install-edge.reg policy/mac-install-edge.sh policy/windows-install-vivaldi.reg policy/mac-install-vivaldi.sh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}-build${{ github.run_number }}
          name: "Creative AI Extension v${{ steps.ver.outputs.version }}"
          make_latest: true
          body: |
            ## Team Install (one-time per machine, then auto-updates forever)

            **Windows:** Download `windows-install.reg`, double-click it, click Yes. Done.

            **Mac:** Download `mac-install.sh`, open Terminal, run `bash ~/Downloads/mac-install.sh`. Done.

            After running the script once, quit Chrome and reopen it. The extension installs automatically and silently updates whenever a new version is released.

            ---

            **Manual install (no auto-update):**
            Download the zip for your browser, extract, go to extensions, enable Developer mode, click "Load unpacked".
          files: |
            dist/creative-ai-chrome.zip
            dist/creative-ai-edge.zip
            dist/creative-ai-opera.zip
            dist/creative-ai-vivaldi.zip
            dist/creative-ai-safari.zip
            dist/creative-ai.crx
            dist/windows-install.reg
            dist/mac-install.sh
            dist/windows-install-edge.reg
            dist/mac-install-edge.sh
            dist/windows-install-vivaldi.reg
            dist/mac-install-vivaldi.sh
